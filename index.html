<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ASIACOMKHK | 网络工程与边缘计算</title>
    <meta name="description" content="专注于 Cloudflare Workers 生态。提供边缘网络诊断工具与高性能 M3U8 播放器解决方案。">
    <meta name="theme-color" content="#0f172a">
    
    <!-- 引入图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- 新增：动态网格背景 --- */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, #1e293b 1px, transparent 1px),
                linear-gradient(to bottom, #1e293b 1px, transparent 1px);
            opacity: 0.1;
            z-index: -1;
            animation: moveGrid 20s linear infinite;
            pointer-events: none;
        }
        @keyframes moveGrid {
            0% { transform: translateY(0); }
            100% { transform: translateY(40px); }
        }

        /* 装饰性光晕 */
        .glow {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(56,189,248,0.15) 0%, rgba(15,23,42,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
            padding: 2rem 0;
            z-index: 1;
        }

        /* 头像区域 */
        .profile-section { margin-bottom: 2.5rem; animation: fadeInDown 0.8s ease-out; }
        .avatar {
            width: 96px; height: 96px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            margin-bottom: 1rem;
            object-fit: cover;
            background-color: #1e293b; /* 占位色 */
        }
        .title { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
        
        /* --- 新增：终端打字效果 --- */
        .terminal-text {
            font-family: 'Courier New', Courier, monospace;
            color: var(--primary);
            font-size: 0.95rem;
            background: rgba(15, 23, 42, 0.8);
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            display: inline-block;
            min-height: 1.5em;
        }
        .cursor {
            display: inline-block;
            width: 8px; height: 16px;
            background-color: var(--primary);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 4px;
        }

        /* 项目卡片区域 */
        .projects-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        @media(min-width: 640px) {
            .projects-grid { grid-template-columns: 1fr 1fr; }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: left;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
            animation: fadeInUp 0.8s ease-out backwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .card-header { display: flex; align-items: center; margin-bottom: 1rem; }
        .card-icon {
            font-size: 1.5rem; color: var(--primary);
            margin-right: 0.75rem;
        }
        .card-title { font-size: 1.25rem; font-weight: 600; color: #fff; }
        .card-desc {
            font-size: 0.875rem; color: var(--text-muted);
            line-height: 1.6; margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 100%; padding: 0.75rem 1rem;
            background: var(--primary); color: #0f172a;
            font-weight: 600; font-size: 0.9rem;
            border-radius: 8px; text-decoration: none;
            transition: background 0.2s;
            border: none; cursor: pointer;
        }
        .btn:hover { background: #7dd3fc; }
        .btn i { margin-right: 0.5rem; }

        /* 底部 */
        .footer {
            margin-top: 2rem; padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: var(--text-muted); font-size: 0.8rem;
            animation: fadeIn 1s ease-out 0.5s backwards;
        }
        
        /* --- 新增：复制提示 Toast --- */
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary); color: #0f172a;
            padding: 10px 20px; border-radius: 30px;
            font-weight: 600; font-size: 0.9rem;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            display: flex; align-items: center;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast i { margin-right: 8px; }

        /* 动画 */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    </style>
</head>
<body>

    <!-- 背景特效 -->
    <div class="bg-grid"></div>
    <div class="glow"></div>

    <div class="container">
        
        <!-- 个人资料 -->
        <header class="profile-section">
            <!-- 这里的 src 可以换成你自己的头像链接，或者保留这个占位符 -->
            <img src="https://avatars.githubusercontent.com/u/your-username" alt="Avatar" class="avatar" onerror="this.src='https://ui-avatars.com/api/?name=ASIACOMKHK&background=38bdf8&color=0f172a&size=128'">
            <h1 class="title">ASIACOMKHK</h1>
            <div class="terminal-text">
                <span id="typewriter"></span><span class="cursor"></span>
            </div>
        </header>

        <!-- 项目展示 -->
        <main class="projects-grid">
            <!-- 项目 1: NetDiag -->
            <article class="card">
                <div class="card-header">
                    <i class="fa-solid fa-network-wired card-icon"></i>
                    <h2 class="card-title">网络诊断工具</h2>
                </div>
                <p class="card-desc">
                    基于 Cloudflare Workers 的边缘网络诊断平台。提供节点延迟测试、路由追踪及全球连通性分析，帮助工程师快速定位网络瓶颈。
                </p>
                <a href="https://asiacomkhk.github.io/CF-workers-netdiag/" target="_blank" class="btn">
                    <i class="fa-solid fa-rocket"></i> 立即测试
                </a>
            </article>

            <!-- 项目 2: M3U8 Player -->
            <article class="card">
                <div class="card-header">
                    <i class="fa-solid fa-film card-icon"></i>
                    <h2 class="card-title">M3U8 播放器</h2>
                </div>
                <p class="card-desc">
                    轻量级流媒体播放解决方案。支持 HLS/M3U8 协议，低延迟解码，适配多端设备，专为高性能视频流体验设计。
                </p>
                <a href="https://asiacomkhk.github.io/CF-Woker-M3U8Player/" target="_blank" class="btn">
                    <i class="fa-solid fa-play"></i> 开始播放
                </a>
            </article>
        </main>

        <!-- 底部联系方式 -->
        <footer class="footer">
            <p>© 2024 ASIACOMKHK. Built with Edge Computing.</p>
            <div style="margin-top: 10px;">
                <button onclick="copyEmail()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.8rem; text-decoration:underline;">
                    <i class="fa-regular fa-envelope"></i> 点击复制邮箱联系我
                </button>
            </div>
        </footer>

    </div>

    <!-- 复制提示弹窗 -->
    <div id="toast" class="toast">
        <i class="fa-solid fa-check-circle"></i> 邮箱已复制
    </div>

    <script>
        // --- 功能 1: 终端打字效果 ---
        const texts = [
            "Network Engineer",
            "Cloudflare Worker Dev",
            "Latency Optimization",
            "Stream Media Specialist"
        ];
        let textIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typeWriterElement = document.getElementById('typewriter');

        function type() {
            const currentText = texts[textIndex];
            
            if (isDeleting) {
                typeWriterElement.textContent = currentText.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typeWriterElement.textContent = currentText.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 50 : 100;

            if (!isDeleting && charIndex === currentText.length) {
                typeSpeed = 2000; // 停顿时间
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                textIndex = (textIndex + 1) % texts.length;
                typeSpeed = 500;
            }

            setTimeout(type, typeSpeed);
        }
        
        // 启动打字机
        document.addEventListener('DOMContentLoaded', type);

        // --- 功能 2: 一键复制邮箱 ---
        function copyEmail() {
            // 这里修改为你真实的邮箱
            const email = "contact@asiacomkhk.com"; 
            
            navigator.clipboard.writeText(email).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
            });
        }
    </script>
</body>
</html>
