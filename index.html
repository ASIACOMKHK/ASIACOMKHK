<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- ... (保留原有的 meta 标签) ... -->
    <title>ASIACOMKHK | 网络工程与流媒体</title>
    <!-- ... (保留原有的 CSS 样式) ... -->
    <style>
        /* ... (原有样式保持不变) ... */

        /* --- 新增：时间与问候语样式 --- */
        .time-greeting {
            font-size: 0.95rem;
            color: var(--primary-color);
            font-weight: 500;
            margin-top: 0.5rem;
            text-align: center;
            width: 100%;
            max-width: 300px;
        }

        /* --- 新增：天气卡片样式 --- */
        .weather-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-sub);
        }
        .weather-icon { font-size: 1.5rem; }
    </style>
</head>
<body>

    <!-- ... (保留原有的主题切换按钮) ... -->

    <!-- 修改：头部信息区域 -->
    <header class="header-container">
        <h1>ASIACOMKHK</h1>
        <div class="subtitle">
            <span><span class="status-dot"></span> 在线服务</span>
            <span>|</span>
            <span id="visitor-ip">正在加载 IP...</span>
        </div>
        <!-- 新增：本地化时间与问候 -->
        <div class="time-greeting" id="timeGreeting">
            <!-- 动态内容由 JS 生成 -->
        </div>
    </header>

    <!-- 卡片区域 (新增天气卡片) -->
    <main class="grid-container">
        
        <!-- ... (保留原有的 NetDiag 和 M3U8 Player 卡片) ... -->

        <!-- 新增卡片：地点与天气 -->
        <article class="card">
            <div class="card-icon">🌤️</div>
            <h3>江门气象站</h3>
            <p>实时获取广东江门的天气状况，辅助网络测试环境评估。</p>
            <div class="weather-info" id="weatherInfo">
                <span class="weather-icon">📡</span>
                <span>正在获取天气数据...</span>
            </div>
        </article>

    </main>

    <!-- ... (保留原有的 Footer) ... -->

    <script>
        // ... (保留原有的主题切换逻辑) ...

        // --- 1. 本地化时间与智能问候 ---
        function updateTime() {
            const now = new Date();
            
            // 格式化日期：2026年5月12日 星期二
            const dateStr = now.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });

            // 格式化时间：14:30:25
            const timeStr = now.toLocaleTimeString('zh-CN');

            // 智能问候语
            const hours = now.getHours();
            let greeting = '';
            if (hours < 6) greeting = '夜猫子，注意身体';
            else if (hours < 9) greeting = '早上好，新的一天';
            else if (hours < 12) greeting = '上午好，工作顺利';
            else if (hours < 14) greeting = '中午好，该休息了';
            else if (hours < 18) greeting = '下午好，效率满满';
            else if (hours < 22) greeting = '晚上好，放松一下';
            else greeting = '晚安，世界';

            document.getElementById('timeGreeting').innerHTML = 
                `${dateStr} ${timeStr} <br> <small>${greeting} | 广东江门`</small>`;
        }

        // 页面加载时执行，并设置每秒更新
        window.addEventListener('load', () => {
            updateTime(); // 立即执行一次
            setInterval(updateTime, 1000); // 每秒更新
            // ... (原有的 IP 获取逻辑) ...
        });

        // --- 2. 天气获取逻辑 (针对广东江门) ---
        async function fetchWeather() {
            try {
                // 使用 wttr.in 的 JSON 接口，指定城市为 Jiangmen
                // 注意：在真实 Workers 环境中，如果 Workers 本身在海外，显示的是 Workers 的位置天气
                // 如果你想显示访客（江门）的天气，需要前端 JS 请求
                const response = await fetch('https://wttr.in/Jiangmen?format=j1');
                const data = await response.json();
                
                const weatherInfo = document.getElementById('weatherInfo');
                const current = data.current_condition[0];
                
                weatherInfo.innerHTML = `
                    <span class="weather-icon">☀️</span>
                    <span>
                        ${current.temp_C}°C | ${current.weatherDesc[0].value}
                        <br>
                        <small>湿度: ${current.humidity}% | 风速: ${current.windspeedKmph} km/h</small>
                    </span>
                `;
            } catch (error) {
                console.error('天气获取失败:', error);
                document.getElementById('weatherInfo').innerHTML = 
                    '<span class="weather-icon">⚠️</span> <span>天气数据加载中...</span>';
            }
        }

        // 在页面加载完成后调用
        window.addEventListener('load', () => {
            fetchVisitorInfo(); // 原有逻辑
            fetchWeather();     // 新增逻辑
            document.getElementById('year').textContent = new Date().getFullYear();
        });
    </script>
</body>
</html>
