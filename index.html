            --border-color:#e2e8f0;--text-primary:#1a202c;--text-secondary:#4a5568;

        body{background:var(--bg-primary);font-family:'Inter',sans-serif;color:var(--text-primary);line-height:1.5;transition:background 0.3s,color 0.2s}
        .container{max-width:1280px;margin:0 auto;padding:0 28px}

        .timeline-btn.active{background:var(--accent);color:#0a0c12}
        .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
        .chart-box{background:var(--bg-card);border:1px solid var(--border-color);border-radius:20px;padding:16px}
        .visitor-list{display:flex;flex-wrap:wrap;gap:10px}
        .visitor-item{background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:12px;padding:8px 14px;font-size:0.85rem;display:flex;align-items:center;gap:8px;transition:0.2s}
        .visitor-item:hover{border-color:var(--accent);transform:translateY(-2px)}
        .message-board{background:var(--bg-card);border:1px solid var(--border-color);border-radius:20px;padding:20px}
        .message-list{max-height:200px;overflow-y:auto;margin-bottom:12px}
        .message-item{border-bottom:1px solid var(--border-color);padding:6px 0}
        .message-input{display:flex;gap:8px}
        .message-input input{flex:1;background:var(--code-bg);border:1px solid var(--border-color);border-radius:20px;padding:8px 14px;color:var(--text-primary)}
        .message-input button{background:var(--accent);border:none;border-radius:20px;padding:8px 18px;cursor:pointer;font-weight:600}
        .notification{position:fixed;top:20px;right:20px;background:var(--accent);color:#fff;padding:10px 20px;border-radius:30px;z-index:999;display:none;box-shadow:0 5px 15px rgba(0,0,0,0.3);animation:slideDown 0.5s}

        @media(max-width:880px){.content-grid,.charts-row{grid-template-columns:1fr}}

</head>

<script>
// ==================== 全局状态 ====================
const DB_NAME = 'VisitorTimeMachineDB';
const DB_VERSION = 2;
let db = null;
let chartInst = null, trendChart = null, pieChart = null;
let currentLang = navigator.language.startsWith('zh') ? 'zh' : 'en';
let currentPersona = null;

// ==================== 国际化 ====================
const i18n = {
    zh: {
        title: '访客时光机 · IP人设卡',
        loading: '时光机待命...',
        totalVisitors: '总访客',
        countries: '国家',
        today: '今天',
        all: '全部',
        export: '📸 生成纪念卡',
        placeholder: '留言...',
        send: '发送',
        newVisitor: '🎉 新访客抵达！',
        greetings: ['午夜星光伴你','晨光中踏露而来','正午的勇者','慵懒午后','黄昏魔术','夜色神秘']
    },
    en: {
        title: 'Visitor Time Machine',
        loading: 'Time Machine standing by...',
        totalVisitors: 'Visitors',
        countries: 'Countries',
        today: 'Today',
        all: 'All',
        export: '📸 Export Card',
        placeholder: 'Message...',
        send: 'Send',
        newVisitor: '🎉 New visitor!',
        greetings: ['Midnight stars','Dawn explorer','Noon warrior','Afternoon vibes','Sunset magic','Night secrets']
    }
};
function t(key, params) {
    let str = i18n[currentLang][key] || key;
    if (params) Object.entries(params).forEach(([k,v]) => str = str.replace(`{${k}}`, v));
    return str;
}

// ==================== IndexedDB 操作 ====================
function openDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('visits')) db.createObjectStore('visits', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('messages')) db.createObjectStore('messages', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('geojson')) db.createObjectStore('geojson', { keyPath: 'key' });
        };
        request.onsuccess = (e) => { db = e.target.result; resolve(db); };
        request.onerror = (e) => reject(e.target.error);
    });
}

async function getVisits() {
    if (!db) await openDB();
    return new Promise((resolve) => {
        const tx = db.transaction('visits', 'readonly');
        const store = tx.objectStore('visits');
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result.sort((a,b) => b.timestamp - a.timestamp));
    });
}

async function saveVisit(visit) {
    if (!db) await openDB();
    visit.id = Date.now() + Math.random();
    const tx = db.transaction('visits', 'readwrite');
    const store = tx.objectStore('visits');
    store.put(visit);
    return new Promise((resolve) => { tx.oncomplete = () => resolve(); });
}

async function getMessages() {
    if (!db) await openDB();
    const tx = db.transaction('messages', 'readonly');
    const store = tx.objectStore('messages');
    return new Promise((resolve) => {
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result.sort((a,b) => b.time - a.time));
    });
}

async function saveMessage(author, text) {
    if (!db) await openDB();
    const tx = db.transaction('messages', 'readwrite');
    const store = tx.objectStore('messages');
    store.put({ id: Date.now(), author, text, time: Date.now() });
    return new Promise((resolve) => { tx.oncomplete = () => resolve(); });
}

// GeoJSON 缓存
async function getCachedGeoJSON() {
    if (!db) await openDB();
    const tx = db.transaction('geojson', 'readonly');
    const store = tx.objectStore('geojson');
    return new Promise((resolve) => {
        const req = store.get('world');
        req.onsuccess = () => resolve(req.result ? req.result.data : null);
    });
}

async function cacheGeoJSON(data) {
    if (!db) await openDB();
    const tx = db.transaction('geojson', 'readwrite');
    const store = tx.objectStore('geojson');
    store.put({ key: 'world', data });
    return new Promise((resolve) => { tx.oncomplete = () => resolve(); });
}

// ==================== IP 查询 (带重试) ====================
async function fetchIPInfo(retries = 3) {
    for (let i = 0; i < retries; i++) {
        try {
            const resp = await fetch('https://ipapi.co/json/');
            if (resp.ok) return await resp.json();
        } catch (e) {}
        await new Promise(r => setTimeout(r, 1000));
    }
    return null;
}

// ==================== 头像生成 ====================
function generateAvatar(ip) {
    const canvas = document.createElement('canvas');
    canvas.width = 100; canvas.height = 100;
    const ctx = canvas.getContext('2d');
    let hash = 0;
    for (let i = 0; i < ip.length; i++) {
        hash = ip.charCodeAt(i) + ((hash << 5) - hash);
    }
    const hue = Math.abs(hash % 360);
    ctx.fillStyle = `hsl(${hue}, 70%, 65%)`;
    ctx.fillRect(0, 0, 100, 100);
    ctx.fillStyle = `hsl(${hue}, 70%, 30%)`;
    ctx.font = 'bold 50px Inter';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ip.charAt(0).toUpperCase(), 50, 50);
    return canvas.toDataURL();
}

// ==================== 地区映射 ====================
const regionMap = {
    CN:{vibe:'古风',animal:'🐼',headwear:'竹簪',hello:'你好'},
    JP:{vibe:'和风',animal:'🐱',headwear:'樱花',hello:'こんにちは'},
    US:{vibe:'牛仔',animal:'🦅',headwear:'牛仔帽',hello:'Howdy'},
    FR:{vibe:'浪漫',animal:'🐓',headwear:'贝雷帽',hello:'Bonjour'},
    DE:{vibe:'严谨',animal:'🦅',headwear:'啤酒帽',hello:'Guten Tag'},
    UK:{vibe:'绅士',animal:'🦁',headwear:'礼帽',hello:'Hello'},
    KR:{vibe:'K-pop',animal:'🐯',headwear:'发带',hello:'안녕하세요'},
    IT:{vibe:'艺术',animal:'🐺',headwear:'橄榄枝',hello:'Ciao'},
    ES:{vibe:'热情',animal:'🐂',headwear:'弗拉明戈花',hello:'¡Hola'},
    BR:{vibe:'桑巴',animal:'🦜',headwear:'羽毛头饰',hello:'Olá'},
    RU:{vibe:'豪迈',animal:'🐻',headwear:'哥萨克帽',hello:'Здравствуйте'},
    IN:{vibe:'神秘',animal:'🐅',headwear:'珠饰',hello:'नमस्ते'},
    AU:{vibe:'阳光',animal:'🐨',headwear:'软木帽',hello:'G\'day'},
    CA:{vibe:'极地',animal:'🦌',headwear:'保暖耳罩',hello:'Hello'},
};
function getRegion(code) {
    return regionMap[code] || {vibe:'赛博',animal:'🐱',headwear:'光环',hello:'你好'};
}

function getGreeting(hour) {
    const list = i18n[currentLang].greetings;
    if (hour < 6) return list[0];
    if (hour < 10) return list[1];
    if (hour < 14) return list[2];
    if (hour < 18) return list[3];
    if (hour < 22) return list[4];
    return list[5];
}

function buildPersona(ipData) {
    const region = getRegion(ipData.country_code);
    const hour = new Date().getHours();
    const avatar = generateAvatar(ipData.ip);
    return {
        name: `${region.vibe} · ${ipData.city || '未知'}`,
        animal: region.animal,
        headwear: region.headwear,
        localHello: region.hello,
        avatar,
        country: ipData.country_name || '未知',
        countryCode: ipData.country_code || 'XX',
        lat: ipData.latitude,
        lng: ipData.longitude,
        isp: ipData.org || '未知运营商',
        greeting: getGreeting(hour),
        raw: {
            ip: ipData.ip,
            city: ipData.city,
            time: new Date().toLocaleString('zh-CN'),
        },
        timestamp: Date.now(),
    };
}

// ==================== GeoJSON 加载 ====================
async function loadGeoJSON() {
    let cached = await getCachedGeoJSON();
    if (cached) return cached;
    const urls = [
        'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson',
        'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'
    ];
    for (const url of urls) {
        try {
            const resp = await fetch(url);
            if (!resp.ok) continue;
            let geoJSON;
            if (url.includes('world-atlas')) {
                const topo = await resp.json();
                const features = topo.objects.countries.geometries.map(g => ({
                    type: 'Feature',
                    properties: g.properties || {},
                    geometry: g.type === 'Polygon' 
                        ? { type: 'Polygon', coordinates: g.arcs.map(a => a.map(i => topo.arcs[i])) }
                        : { type: 'MultiPolygon', coordinates: g.arcs.map(p => p.map(a => a.map(i => topo.arcs[i]))) }
                }));
                geoJSON = { type: 'FeatureCollection', features };
            } else {
                geoJSON = await resp.json();
            }
            await cacheGeoJSON(geoJSON);
            return geoJSON;
        } catch (e) {}
    }
    return null;
}

// ==================== 图表函数 ====================
function initMap(visitors, current) {
    const dom = document.getElementById('worldMap');
    if (!dom) return;
    if (chartInst) chartInst.dispose();
    chartInst = echarts.init(dom, 'dark');
    
    loadGeoJSON().then(geoJSON => {
        if (!geoJSON) { dom.innerHTML = '地图加载失败'; return; }
        echarts.registerMap('world', geoJSON);
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        const points = visitors.map(v => ({
            name: v.raw.city,
            value: [v.lng || 0, v.lat || 0, v.name, v.isp, v.raw.time],
            raw: v
        }));
        const option = {
            backgroundColor: 'transparent',
            geo: {
                map: 'world',
                roam: true,
                itemStyle: {
                    areaColor: isLight ? '#f5f5f5' : '#1a1a3a',
                    borderColor: isLight ? '#ccc' : 'rgba(100,150,255,0.4)'
                }
            },
            series: [
                { type: 'scatter', coordinateSystem: 'geo', data: points, symbolSize: 10, itemStyle: { color: '#ff6b9d' } },
                {
                    type: 'effectScatter', coordinateSystem: 'geo',
                    data: current ? [{ name: current.raw.city, value: [current.lng || 0, current.lat || 0, current.name, current.isp, current.raw.time] }] : [],
                    symbolSize: 16, rippleEffect: { scale: 4, period: 4 },
                    itemStyle: { color: '#f9d71c' }
                }
            ],
            tooltip: { trigger: 'item', formatter: p => `${p.name}<br/>${p.value[2] || ''}<br/>${p.value[3] || ''}<br/>${p.value[4] || ''}` }
        };
        chartInst.setOption(option);
        chartInst.on('click', (params) => {
            if (params.data.raw) {
                const v = params.data.raw;
                alert(`${v.country} · ${v.raw.city}\n📡 ${v.isp}\n🕒 ${v.raw.time}\n👋 ${v.localHello}`);
            }
        });
    });
}

function initTrendChart(visits) {
    const dom = document.getElementById('trendChart');
    if (!dom) return;
    if (trendChart) trendChart.dispose();
    trendChart = echarts.init(dom, 'dark');
    const dates = [];
    for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        dates.push(d.toLocaleDateString());
    }
    const counts = dates.map(date => visits.filter(v => new Date(v.timestamp).toLocaleDateString() === date).length);
    trendChart.setOption({
        backgroundColor: 'transparent',
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: { type: 'category', data: dates, axisLabel: { color: '#ccc' } },
        yAxis: { type: 'value', axisLabel: { color: '#ccc' } },
        series: [{ data: counts, type: 'bar', itemStyle: { color: '#2dc9ff' } }]
    });
}

function initPieChart(visits) {
    const dom = document.getElementById('pieChart');
    if (!dom) return;
    if (pieChart) pieChart.dispose();
    pieChart = echarts.init(dom, 'dark');
    const countryCounts = {};
    visits.forEach(v => {
        if (v.countryCode !== 'XX') {
            countryCounts[v.country] = (countryCounts[v.country] || 0) + 1;
        }
    });
    const data = Object.entries(countryCounts).map(([name, value]) => ({ name, value }));
    pieChart.setOption({
        backgroundColor: 'transparent',
        series: [{
            type: 'pie', radius: '70%', data,
            label: { color: '#ccc' },
            itemStyle: { borderColor: 'var(--bg-card)' }
        }]
    });
}

// ==================== 主界面渲染 ====================
function updateUI(visits, current, filterDate = null) {
    const container = document.getElementById('tmContainer');
    const filtered = filterDate
        ? visits.filter(v => new Date(v.timestamp).toLocaleDateString() === filterDate)
        : visits;
    
    const timelineDates = [...new Set(visits.map(v => new Date(v.timestamp).toLocaleDateString()))].sort().reverse();
    const timelineHTML = `
        <button class="timeline-btn ${!filterDate ? 'active' : ''}" data-date="">${t('all')}</button>
        ${timelineDates.map(d => `<button class="timeline-btn ${d === filterDate ? 'active' : ''}" data-date="${d}">${d === new Date().toLocaleDateString() ? t('today') : d}</button>`).join('')}
    `;

    container.innerHTML = `
        <div class="stats-bar">
            <div class="stat-card"><div class="stat-value">${visits.length}</div><div class="stat-label">${t('totalVisitors')}</div></div>
            <div class="stat-card"><div class="stat-value">${new Set(visits.map(v => v.countryCode).filter(c => c !== 'XX')).size}</div><div class="stat-label">${t('countries')}</div></div>
        </div>
        <div class="content-grid">
            <div class="map-card"><div id="worldMap" style="height:400px"></div></div>
            <div class="persona-card" id="personaCard">
                <img src="${current.avatar}" class="avatar-img" alt="avatar">
                <div class="persona-name">${current.name}</div>
                <div class="persona-details">
                    <span class="detail-tag">${current.animal} ${current.headwear}</span>
                    <span class="detail-tag">📡 ${current.isp}</span>
                    <span class="detail-tag">👋 ${current.localHello}</span>
                </div>
                <p style="font-style:italic;color:var(--text-muted)">${current.greeting}</p>
                <p style="margin-top:8px;font-size:0.8rem;color:var(--text-muted)">🕒 ${current.raw.time}</p>
                <button class="export-btn" id="exportBtn">${t('export')}</button>
            </div>
        </div>
        <div class="timeline" id="timelineBar">${timelineHTML}</div>
        <div class="charts-row">
            <div class="chart-box"><div id="trendChart" style="height:200px"></div></div>
            <div class="chart-box"><div id="pieChart" style="height:200px"></div></div>
        </div>
        <div class="visitor-list">
            ${filtered.map(v => `<div class="visitor-item"><span>${v.animal}</span> ${v.name}</div>`).join('')}
        </div>
        <div class="message-board">
            <h3>📝 访客留言板</h3>
            <div class="message-list" id="messageList"></div>
            <div class="message-input">
                <input type="text" id="msgAuthor" placeholder="昵称">
                <input type="text" id="msgText" placeholder="${t('placeholder')}">
                <button id="sendMsgBtn">${t('send')}</button>
            </div>
        </div>
    `;

    initMap(filtered, current);
    initTrendChart(visits);
    initPieChart(visits);
    bindEvents(visits, current);
    loadMessages();
}

function bindEvents(visits, current) {
    document.querySelectorAll('.timeline-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const date = btn.dataset.date;
            updateUI(visits, current, date || null);
        });
    });
    document.getElementById('exportBtn').addEventListener('click', () => {
        if (!window.html2canvas) {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
            script.onload = () => html2canvas(document.getElementById('personaCard')).then(c => {
                const a = document.createElement('a');
                a.href = c.toDataURL();
                a.download = 'visitor-card.png';
                a.click();
            });
            document.head.appendChild(script);
        } else {
            html2canvas(document.getElementById('personaCard')).then(c => {
                const a = document.createElement('a');
                a.href = c.toDataURL();
                a.download = 'visitor-card.png';
                a.click();
            });
        }
    });
    document.getElementById('sendMsgBtn').addEventListener('click', async () => {
        const author = document.getElementById('msgAuthor').value.trim();
        const text = document.getElementById('msgText').value.trim();
        if (author && text) {
            await saveMessage(author, text);
            document.getElementById('msgAuthor').value = '';
            document.getElementById('msgText').value = '';
            loadMessages();
        }
    });
}

async function loadMessages() {
    const list = document.getElementById('messageList');
    if (!list) return;
    const msgs = await getMessages();
    list.innerHTML = msgs.map(m => `<div class="message-item"><strong>${m.author}</strong>: ${m.text}</div>`).join('');
}

// ==================== 实时通知 ====================
let lastCount = 0;
setInterval(async () => {
    const visits = await getVisits();
    if (visits.length > lastCount) {
        lastCount = visits.length;
        const notif = document.getElementById('notify');
        notif.textContent = t('newVisitor');
        notif.style.display = 'block';
        setTimeout(() => notif.style.display = 'none', 3000);
    }
}, 15000);

// ==================== 懒加载初始化 ====================
async function initTimeMachine() {
    const placeholder = document.getElementById('tmPlaceholder');
    const container = document.getElementById('tmContainer');
    
    const ipData = await fetchIPInfo();
    if (!ipData) {
        placeholder.innerHTML = '❌ 无法获取 IP 信息，请刷新重试';
        return;
    }
    const persona = buildPersona(ipData);
    currentPersona = persona;
    await saveVisit(persona);
    let visits = await getVisits();
    lastCount = visits.length;
    
    placeholder.style.display = 'none';
    container.classList.add('visible');
    updateUI(visits, persona);
}

// 懒加载观察器
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            observer.unobserve(entry.target);
            openDB().then(() => initTimeMachine());
        }
    });
}, { threshold: 0.1 });
observer.observe(document.getElementById('tmPlaceholder'));

// ==================== 主题与语言切换 ====================
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;
if (localStorage.getItem('theme') === 'light') html.setAttribute('data-theme', 'light');
themeToggle.addEventListener('click', () => {
    const isDark = html.getAttribute('data-theme') !== 'light';
    if (isDark) {
        html.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
        themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
    } else {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'dark');
        themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
    }
    // 重绘
    if (currentPersona) {
        getVisits().then(visits => updateUI(visits, currentPersona));
    }
});

document.getElementById('langToggle').addEventListener('click', () => {
    currentLang = currentLang === 'zh' ? 'en' : 'zh';
    document.getElementById('langToggle').textContent = currentLang === 'zh' ? '🌐 EN' : '🌐 中';
    document.getElementById('tmTitle').textContent = t('title');
    document.getElementById('tmLoadingText').textContent = t('loading');
    if (currentPersona) {
        getVisits().then(visits => updateUI(visits, currentPersona));
    }
});

// 平滑滚动
document.querySelectorAll('.nav-links a[href^="#"]').forEach(link => {
    link.addEventListener('click', (e) => {
        e.preventDefault();
        const target = document.querySelector(link.getAttribute('href'));
        if (target) target.scrollIntoView({ behavior: 'smooth' });
    });
});
</script>
