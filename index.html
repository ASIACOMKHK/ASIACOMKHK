<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASIACOMKHK | 极客导航</title>
    <meta name="description" content="Cloudflare Workers 生态工具箱：网络诊断、M3U8播放器及开发者实用工具。">
    <meta name="theme-color" content="#0f172a">
    <style>
        /* --- 全局样式与变量 --- */
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary-color: #38bdf8;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --border-color: rgba(148, 163, 184, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, var(--bg-color) 80%);
        }

        /* --- 头部信息 --- */
        header { text-align: center; margin-bottom: 30px; margin-top: 10px; }
        .time-display { font-family: 'Courier New', monospace; color: var(--primary-color); font-size: 0.8rem; opacity: 0.8; margin-top: 5px; }
        h1 { font-weight: 600; letter-spacing: 1px; color: #fff; text-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }
        .subtitle { font-size: 0.9rem; color: var(--text-sub); margin-top: 5px; }

        /* --- 网格布局 --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        /* --- 卡片通用样式 --- */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5); border-color: rgba(56, 189, 248, 0.3); }
        .card-header { display: flex; align-items: center; margin-bottom: 20px; }
        .card-icon { width: 32px; height: 32px; margin-right: 12px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .card-title { font-size: 1.1rem; font-weight: 600; color: #fff; }
        .card-desc { font-size: 0.85rem; color: var(--text-sub); line-height: 1.5; margin-bottom: 20px; flex-grow: 1; }

        /* --- 按钮样式 --- */
        .btn {
            background-color: var(--primary-color);
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        .btn:hover { background-color: #7dd3fc; }
        .btn:active { transform: scale(0.98); }
        .btn-outline { background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color); margin-top: 10px; }
        .btn-outline:hover { background: rgba(56, 189, 248, 0.1); }

        /* --- 模块特定样式 --- */
        /* 天气 */
        #weather-temp { font-size: 2rem; font-weight: 700; color: #fff; }
        #weather-desc { color: var(--primary-color); font-size: 0.9rem; margin-top: 5px; }
        #weather-loading { font-size: 0.9rem; color: var(--text-sub); }

        /* GitHub */
        .gh-container { display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; padding: 10px 0; }
        .gh-avatar { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--primary-color); margin-bottom: 15px; background-color: #fff; }
        .gh-username { font-weight: 600; color: #fff; margin-bottom: 15px; font-size: 1.1rem; }

        /* 状态 */
        .status-item { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.9rem; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .status-label { color: var(--text-sub); }
        .status-value { font-family: 'Courier New', monospace; color: #fff; font-weight: 600; }
        .status-online { color: #4ade80; }

        /* 工具箱 */
        .tool-group { margin-bottom: 20px; }
        .tool-label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600; color: #fff; }
        .input-group { display: flex; gap: 10px; }
        input { background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-color); color: #fff; padding: 8px 12px; border-radius: 6px; flex: 1; font-size: 0.9rem; outline: none; }
        input:focus { border-color: var(--primary-color); }
        .small-btn { width: auto; padding: 0 15px; font-size: 0.85rem; }
        #base64-result { margin-top: 10px; font-size: 0.85rem; color: var(--primary-color); word-break: break-all; background: rgba(15, 23, 42, 0.4); padding: 10px; border-radius: 6px; display: none; }

        /* 响应式 */
        @media (max-width: 768px) {
            .grid-container { grid-template-columns: 1fr; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>ASIACOMKHK</h1>
        <div class="subtitle">Cloudflare Workers 生态导航</div>
        <div class="time-display" id="clock">00:00:00</div>
    </header>

    <main class="grid-container">

        <!-- 1. 网络诊断 (外部链接) -->
        <div class="card">
            <div class="card-header">
                <div class="card-icon" style="background: rgba(56, 189, 248, 0.2);">🛰️</div>
                <div class="card-title">NetDiag 网络诊断</div>
            </div>
            <div class="card-desc">基于 Cloudflare Workers 的边缘网络诊断工具。支持多节点延迟测试、带宽测速及路由追踪。</div>
            <a href="https://asiacomkhk.github.io/CF-workers-netdiag/" target="_blank" class="btn">访问工具</a>
        </div>

        <!-- 2. M3U8 播放器 (外部链接) -->
        <div class="card">
            <div class="card-header">
                <div class="card-icon" style="background: rgba(251, 146, 60, 0.2); color: #fbbf24;">🎬</div>
                <div class="card-title">M3U8 播放器</div>
            </div>
            <div class="card-desc">轻量级、无广告的在线流媒体播放器。专为 HLS/M3U8 格式优化，支持极低延迟播放。</div>
            <a href="https://asiacomkhk.github.io/CF-Woker-M3U8Player/" target="_blank" class="btn">立即播放</a>
        </div>

        <!-- 3. 智能天气 (JS 动态获取) -->
        <div class="card">
            <div class="card-header">
                <div class="card-icon" style="background: rgba(16, 185, 129, 0.2); color: #34d399;">⛅</div>
                <div class="card-title">智能天气</div>
            </div>
            <div style="text-align: center; padding: 20px 0; flex-grow: 1;">
                <div id="weather-temp">--°C</div>
                <div id="weather-desc">定位中...</div>
                <div id="weather-loading" style="font-size: 0.8rem; margin-top: 10px; opacity: 0.6;"></div>
            </div>
            <button onclick="fetchWeather()" class="btn btn-outline" style="margin-top: 0;">刷新天气</button>
        </div>

        <!-- 4. GitHub 动态 (修复版) -->
        <div class="card">
            <div class="card-header">
                <div class="card-icon" style="background: rgba(255, 255, 255, 0.1);">🐙</div>
                <div class="card-title">GitHub 动态</div>
            </div>
            <div class="gh-container">
                <!-- 头像 -->
                <img src="https://avatars.githubusercontent.com/asiacomkhk" alt="Avatar" class="gh-avatar" onerror="this.src='https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'">
                <div class="gh-username">@asiacomkhk</div>

                <!-- 核心修复：使用原生贡献图，并添加 onerror 隐藏 -->
                <img
                    src="https://ghchart.rshah.org/38bdf8/asiacomkhk"
                    alt="asiacomkhk's Github Chart"
                    style="width: 100%; border-radius: 6px; filter: invert(1) hue-rotate(180deg);"
                    onerror="this.style.display='none'; document.getElementById('gh-fallback').style.display='block';"
                >

                <!-- 如果图片加载失败，显示这个 -->
                <div id="gh-fallback" style="display:none; text-align:center; color: var(--text-sub); font-size: 0.9rem;">
                    暂无动态数据
                </div>
            </div>
            <a href="https://github.com/asiacomkhk" target="_blank" class="btn btn-outline">查看主页</a>
        </div>

        <!-- 5. 开发者工具箱 -->
        <div class="card">
            <div class="card-header">
                <div class="card-icon" style="background: rgba(139, 92, 246, 0.2); color: #a78bfa;">🛠️</div>
                <div class="card-title">开发者工具箱</div>
            </div>

            <!-- 密码生成 -->
            <div class="tool-group">
                <label class="tool-label">随机密码生成</label>
                <div class="input-group">
                    <input type="number" id="pwd-len" value="16" min="4" max="64" style="max-width: 80px;">
                    <button class="btn small-btn" onclick="generatePassword()">生成</button>
                </div>
                <input type="text" id="pwd-result" readonly style="margin-top: 10px; cursor: pointer;" onclick="copyText('pwd-result')" placeholder="点击生成...">
            </div>

            <!-- Base64 -->
            <div class="tool-group">
                <label class="tool-label">Base64 编解码</label>
                <input type="text" id="base64-input" placeholder="输入文本..." style="margin-bottom: 10px;">
                <div style="display: flex; gap: 10px;">
                    <button class="btn small-btn" onclick="base64Encode()" style="flex:1">编码</button>
                    <button class="btn small-btn" onclick="base64Decode()" style="flex:1">解码</button>
                </div>
                <div id="base64-result"></div>
            </div>
        </div>

        <!-- 6. 运行状态 (静态展示) -->
        <div class="card">
            <div class="card-header">
                <div class="card-icon" style="background: rgba(239, 68, 68, 0.2); color: #f87171;">📊</div>
                <div class="card-title">运行状态</div>
            </div>
            <div style="flex-grow: 1;">
                <div class="status-item">
                    <span class="status-label">服务状态</span>
                    <span class="status-value status-online">正常运行</span>
                </div>
                <div class="status-item">
                    <span class="status-label">累计运行</span>
                    <span class="status-value" id="uptime">计算中...</span>
                </div>
                <div class="status-item" style="border:none;">
                    <span class="status-label">部署版本</span>
                    <span class="status-value">v2.4.0</span>
                </div>
            </div>
            <button onclick="location.reload()" class="btn btn-outline">刷新页面</button>
        </div>

    </main>

    <script>
        // --- 1. 时钟逻辑 ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 2. 运行时长计算 ---
        // 假设上线日期：2023年1月1日
        const launchDate = new Date("2023-01-01").getTime();
        const uptimeEl = document.getElementById('uptime');

        function updateUptime() {
            const now = Date.now();
            const diff = now - launchDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

            uptimeEl.textContent = `${days} 天 ${hours} 小时`;
        }
        setInterval(updateUptime, 60000); // 每分钟更新
        updateUptime();

        // --- 3. 天气逻辑 (带兜底) ---
        async function fetchWeather() {
            const tempEl = document.getElementById('weather-temp');
            const descEl = document.getElementById('weather-desc');
            const loadingEl = document.getElementById('weather-loading');

            tempEl.textContent = '--°C';
            descEl.textContent = '定位中...';
            loadingEl.textContent = '';

            // 默认城市坐标 (北京)
            let lat = 39.9042;
            let lon = 116.4074;
            let isDefault = false;

            try {
                // 尝试获取位置，超时时间 5秒
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
                });
                lat = position.coords.latitude;
                lon = position.coords.longitude;
            } catch (err) {
                console.warn("定位失败，使用默认城市", err);
                isDefault = true;
                loadingEl.textContent = '定位失败，已切换至默认城市';
            }

            try {
                // 使用免费的 Open-Meteo API (无需Key)
                const resp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`);
                const data = await resp.json();

                const temp = Math.round(data.current.temperature_2m);
                const code = data.current.weather_code;

                tempEl.textContent = `${temp}°C`;
                descEl.textContent = isDefault ? '北京 (默认)' : '当前位置';

            } catch (e) {
                tempEl.textContent = 'Err';
                descEl.textContent = '获取天气失败';
                loadingEl.textContent = '';
            }
        }
        // 初始化天气
        fetchWeather();

        // --- 4. 工具箱逻辑 ---
        function generatePassword() {
            const len = document.getElementById('pwd-len').value;
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            let pwd = "";
            for (let i = 0; i < len; i++) {
                pwd += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('pwd-result').value = pwd;
        }

        function copyText(elementId) {
            const el = document.getElementById(elementId);
            el.select();
            document.execCommand('copy');
            alert('已复制到剪贴板');
        }

        function base64Encode() {
            const input = document.getElementById('base64-input').value;
            const resultDiv = document.getElementById('base64-result');
            if(!input) return;
            try {
                resultDiv.textContent = btoa(unescape(encodeURIComponent(input)));
                resultDiv.style.display = 'block';
            } catch(e) { resultDiv.textContent = "编码错误"; resultDiv.style.display = 'block'; }
        }

        function base64Decode() {
            const input = document.getElementById('base64-input').value;
            const resultDiv = document.getElementById('base64-result');
            if(!input) return;
            try {
                resultDiv.textContent = decodeURIComponent(escape(window.atob(input)));
                resultDiv.style.display = 'block';
            } catch(e) { resultDiv.textContent = "解码错误 (非Base64字符串)"; resultDiv.style.display = 'block'; }
        }
    </script>
</body>
</html>
