<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ASIACOMKHK · 技术博客 | CF Workers 项目集</title>
    <meta name="author" content="ASIACOMKHK">
    <meta name="copyright" content="ASIACOMKHK">
    <meta name="description" content="专注于 Cloudflare Workers 生态与边缘计算。我的开源项目诞生于日常技术探索，欢迎交流。">
    <meta name="theme-color" content="#18171d">
    
    <!-- 预加载关键资源 -->
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ==================== 基础变量与重置 ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0c12; --bg-secondary: #10131c; --bg-card: #10131c;
            --border-color: #1e2a3a; --text-primary: #eef4ff; --text-secondary: #b9c7dd;
            --text-muted: #6c86a3; --accent: #2dc9ff; --accent-glow: rgba(45,201,255,0.2);
            --code-bg: #0b0e16; --hover-border: #2dc9ff; --header-bg: rgba(10,12,18,0.85);
            --progress-bar: #2dc9ff;
        }
        [data-theme="light"] {
            --bg-primary: #f4f6fa; --bg-secondary: #ffffff; --bg-card: #ffffff;
            --border-color: #e2e8f0; --text-primary: #1a202c; --text-secondary: #4a5568;
            --text-muted: #718096; --accent: #0d9488; --accent-glow: rgba(13,148,136,0.15);
            --code-bg: #f7fafc; --hover-border: #0d9488; --header-bg: rgba(244,246,250,0.9);
            --progress-bar: #0d9488;
        }
        
        body { background: var(--bg-primary); font-family: 'Inter', sans-serif; color: var(--text-primary); line-height: 1.5; transition: background 0.3s, color 0.2s; }
        html { scroll-behavior: smooth; }
        
        /* 阅读进度条 */
        .progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: transparent; z-index: 1000; }
        .progress-bar { width: 0%; height: 100%; background: var(--progress-bar); box-shadow: 0 0 8px var(--accent); transition: width 0.15s ease; }
        
        /* 背景网格装饰 */
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(45,201,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(45,201,255,0.02) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: -1; }
        
        .container { max-width: 1280px; margin: 0 auto; padding: 0 28px; }
        .section-anchor { scroll-margin-top: 80px; }
        
        /* ==================== 头部导航 ==================== */
        header { position: sticky; top: 0; z-index: 100; background: var(--header-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); padding: 14px 0; }
        .header-flex { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
        .logo a { font-size: 1.4rem; font-weight: 700; text-decoration: none; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; font-family: 'JetBrains Mono', monospace; }
        .logo span { font-size: 0.7rem; font-weight: 400; color: var(--text-muted); margin-left: 6px; }
        
        .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; font-weight: 500; color: var(--text-secondary); transition: 0.2s; font-size: 0.9rem; cursor: pointer; }
        .nav-links a:hover, .nav-links a.active-link { color: var(--accent); }
        
        .random-btn, .theme-toggle { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 40px; padding: 6px 14px; cursor: pointer; color: var(--text-secondary); font-size: 0.85rem; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .random-btn:hover, .theme-toggle:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
        
        /* ==================== 主布局 ==================== */
        .grid-main { display: grid; grid-template-columns: 1fr 340px; gap: 48px; margin: 40px 0 64px; }
        .section-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; border-left: 4px solid var(--accent); padding-left: 18px; }
        .section-title i { color: var(--accent); font-size: 1.3rem; }
        
        /* 项目卡片 */
        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 28px; }
        .project-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 24px; overflow: hidden; transition: all 0.25s ease; }
        .project-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 20px 28px -16px var(--accent-glow); }
        .project-header { background: var(--bg-secondary); padding: 18px 22px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; }
        .project-icon { background: var(--code-bg); width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--accent); }
        .project-title { font-size: 1.25rem; font-weight: 700; }
        .project-badge { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; background: var(--border-color); padding: 4px 10px; border-radius: 40px; margin-left: 10px; color: var(--accent); }
        .project-body { padding: 22px; }
        .project-desc { color: var(--text-secondary); margin-bottom: 18px; font-size: 0.85rem; line-height: 1.5; }
        .tech-stack { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .tech-stack span { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; background: var(--code-bg); padding: 4px 12px; border-radius: 24px; color: var(--accent); }
        .project-links { display: flex; gap: 18px; border-top: 1px solid var(--border-color); padding-top: 18px; }
        .project-links a { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; font-weight: 500; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .project-links a:hover { color: var(--accent); gap: 10px; }
        .demo-btn { background: var(--accent-glow); padding: 5px 12px; border-radius: 40px; border: 1px solid var(--accent); }
        .github-badge { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
        .github-badge img { height: 20px; border-radius: 6px; }
        
        /* 博客列表 */
        .blog-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; margin-bottom: 28px; overflow: hidden; transition: 0.2s; }
        .blog-card:hover { border-color: var(--accent); }
        .blog-content { padding: 22px 26px; }
        .post-meta { display: flex; gap: 16px; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 10px; font-family: 'JetBrains Mono', monospace; }
        .post-title { font-size: 1.3rem; font-weight: 700; margin: 6px 0 12px; }
        .post-title a { text-decoration: none; color: var(--text-primary); transition: color 0.2s; }
        .post-title a:hover { color: var(--accent); }
        .post-excerpt { color: var(--text-secondary); font-size: 0.88rem; line-height: 1.5; margin: 10px 0 18px; }
        .read-more { color: var(--accent); text-decoration: none; font-weight: 500; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 6px; }
        .read-more:hover { gap: 10px; }
        
        /* 关于与侧边栏 */
        .about-content { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 28px; }
        .sidebar { position: sticky; top: 80px; align-self: start; }
        .widget { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 22px; margin-bottom: 26px; }
        .widget-title { font-size: 1.1rem; font-weight: 600; border-left: 3px solid var(--accent); padding-left: 12px; margin-bottom: 18px; }
        .dev-avatar { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
        .dev-avatar img { border-radius: 50%; border: 2px solid var(--accent); }
        .bio-text { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.5; margin-bottom: 16px; }
        .social-links { display: flex; gap: 16px; margin-top: 14px; flex-wrap: wrap; }
        .social-links a { color: var(--text-muted); font-size: 1.2rem; transition: 0.2s; }
        .social-links a:hover { color: var(--accent); transform: translateY(-2px); }
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; background: var(--code-bg); padding: 5px 12px; border-radius: 30px; color: var(--text-secondary); text-decoration: none; transition: 0.2s; }
        .tag:hover { background: var(--accent); color: #0a0c12; }
        .recent-list { list-style: none; }
        .recent-list li { margin-bottom: 12px; border-bottom: 1px dashed var(--border-color); padding-bottom: 10px; }
        .recent-list a { text-decoration: none; color: var(--text-secondary); display: flex; gap: 8px; align-items: baseline; font-size: 0.85rem; }
        .recent-list a i { color: var(--accent); font-size: 0.65rem; }
        .recent-list a:hover { color: var(--accent); }
        
        footer { border-top: 1px solid var(--border-color); padding: 28px 0; text-align: center; font-size: 0.75rem; color: var(--text-muted); }

        /* ==================== 时光机进阶样式 ==================== */
        .time-machine-section { margin-top: 48px; }
        .tm-placeholder { height: 400px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); background: var(--bg-card); border-radius: 24px; border: 1px solid var(--border-color); }
        .tm-container { display: none; flex-direction: column; gap: 20px; animation: fadeIn 0.5s ease; }
        .tm-container.visible { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .tm-stats { display: flex; gap: 20px; justify-content: center; margin-bottom: 10px; }
        .tm-stat { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px 18px; text-align: center; }
        .tm-stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
        .tm-stat-label { font-size: 0.8rem; color: var(--text-muted); }
        
        .time-machine-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 24px; padding: 24px; }
        .map-container { width: 100%; height: 400px; border-radius: 16px; overflow: hidden; background: var(--bg-secondary); }
        
        .persona-card-optimized { display: flex; flex-direction: column; align-items: center; padding: 24px; background: linear-gradient(135deg, var(--accent-glow), rgba(109,255,109,0.05)); border-radius: 16px; border: 1px solid var(--border-color); }
        .persona-animal { font-size: 4.5rem; margin-bottom: 8px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
        .persona-name { font-size: 1.4rem; font-weight: 700; margin: 8px 0; }
        .persona-title { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; }
        .persona-greeting { font-style: italic; color: var(--text-secondary); margin: 8px 0; font-size: 0.9rem; }
        .persona-meta { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 12px 0; }
        .persona-meta span { background: var(--code-bg); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; color: var(--text-secondary); }
        .export-btn { margin-top: 16px; background: var(--accent); border: none; color: #0a0c12; padding: 8px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .export-btn:hover { opacity: 0.9; }
        
        .timeline { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .timeline-item { padding: 6px 16px; border-radius: 20px; background: var(--bg-secondary); border: 1px solid var(--border-color); font-size: 0.8rem; white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .timeline-item.active { background: var(--accent); color: #0a0c12; }
        
        .recent-visitors { margin-top: 24px; }
        .visitor-list { display: flex; flex-wrap: wrap; gap: 12px; }
        .visitor-item { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px 16px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: border-color 0.2s; }
        .visitor-item:hover { border-color: var(--accent); }
        
        .error-box { padding: 20px; background: rgba(255,0,0,0.1); border-radius: 12px; text-align: center; border: 1px solid var(--border-color); }
        .retry-btn { background: var(--accent); border: none; color: #0a0c12; padding: 8px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; }
        
        @media (max-width: 880px) {
            .grid-main { grid-template-columns: 1fr; }
            .sidebar { position: static; }
            .time-machine-grid { grid-template-columns: 1fr; }
            .map-container { height: 300px; }
        }
    </style>
</head>
